<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donations Admin</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid #2f3952;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: #9ba3b4;
      font-weight: 600;
    }

    .tx {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="card">
      <div class="wallet-row">
        <div>
          <h1>Donations Admin</h1>
          <p class="subtitle">Data from MSSQL database</p>
        </div>
        <div>
          <button id="refreshBtn">Refresh</button>
        </div>
      </div>
      <p id="status" class="status"></p>
    </header>

    <section class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Donor</th>
            <th>Amount (ETH)</th>
            <th>Tx Hash</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
